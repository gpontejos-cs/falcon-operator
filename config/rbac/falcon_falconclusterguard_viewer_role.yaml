# This rule is not used by the project falcon-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to falcon.crowdstrike.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: falcon-operator
    app.kubernetes.io/managed-by: kustomize
  name: falcon-falconclusterguard-viewer-role
rules:
- apiGroups:
  - falcon.crowdstrike.com
  resources:
  - falconclusterguards
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - falcon.crowdstrike.com
  resources:
  - falconclusterguards/status
  verbs:
  - get
